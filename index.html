<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>流光泡泡机</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

:root{
    --machine-grad: linear-gradient(145deg,#ff9ec0,#ff6f91);
    --machine-shadow: 0 10px 30px rgba(255,120,170,.35);
    --machine-accent:#fff;
}

body{
    overflow:hidden;
    width:100vw;
    height:100vh;
    background: linear-gradient(to bottom,#dff3ff,#fef6ff 55%,#fff8fb);
    font-family:sans-serif;
    touch-action:manipulation;
}

.title{
    text-align:center;
    padding-top:22px;
    font-size:24px;
    color:#5b7db8;
    font-weight:bold;
}

.controls{
    position:fixed;
    top:62px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
    padding:8px 10px;
    border-radius:16px;
    background:rgba(255,255,255,.62);
    backdrop-filter:blur(8px);
    box-shadow:0 8px 24px rgba(94,116,154,.16);
}

.skin-btn{
    border:none;
    border-radius:999px;
    padding:7px 12px;
    font-size:12px;
    color:#496298;
    background:rgba(255,255,255,.85);
    box-shadow:0 2px 8px rgba(83,105,143,.16);
}

.skin-btn.active{
    background:rgba(97,127,193,.9);
    color:#fff;
}

.machine{
    position:fixed;
    bottom:56px;
    left:50%;
    transform:translateX(-50%);
    width:188px;
    height:114px;
    border-radius:32px;
    background:var(--machine-grad);
    border:1px solid rgba(255,255,255,.4);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:18px;
    letter-spacing:.5px;
    box-shadow:var(--machine-shadow);
    user-select:none;
    transition:filter .25s ease;
}

.machine::after{
    content:"";
    position:absolute;
    inset:7px;
    border-radius:26px;
    border:1px solid rgba(255,255,255,.35);
    pointer-events:none;
}

.nozzle{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:40px;
    height:28px;
    background:var(--machine-accent);
    border-radius:12px;
    box-shadow:inset 0 3px 5px rgba(255,255,255,.45), 0 2px 8px rgba(79,101,146,.22);
}

.machine.is-active{ filter:brightness(1.07) saturate(1.04); }

.bubble{
    position:fixed;
    border-radius:50%;
    pointer-events:auto;
    cursor:pointer;
    background:
      radial-gradient(circle at 28% 26%, rgba(255,255,255,.98), rgba(255,255,255,.75) 14%, transparent 35%),
      radial-gradient(circle at 50% 55%, hsla(var(--hue),90%,74%,.44), hsla(var(--hue),95%,68%,.18) 60%, rgba(255,255,255,.04) 80%);
    box-shadow: inset -8px -12px 16px rgba(255,255,255,.14), inset 8px 8px 14px rgba(255,255,255,.28);
    backdrop-filter:blur(1px);
    animation:floatDrift linear forwards;
    will-change:transform,opacity;
    transform:translate3d(0,0,0);
}

.particle{
    position:fixed;
    width:7px;
    height:7px;
    border-radius:50%;
    pointer-events:none;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), hsla(var(--hue),95%,72%,.7));
    animation: splash .45s ease-out forwards;
    will-change:transform,opacity;
    transform:translate3d(0,0,0);
}

@keyframes floatDrift{
    0%{ transform: translate3d(0,0,0) scale(.72); opacity:0; }
    8%{ opacity:1; }
    40%{ transform: translate3d(calc(var(--x) * .36 + var(--drift-a)), calc(var(--rise) * .38), 0) scale(calc(var(--scale-end) * .95)); }
    67%{ transform: translate3d(calc(var(--x) * .72 + var(--drift-b)), calc(var(--rise) * .7), 0) scale(calc(var(--scale-end) * 1.03)); }
    100%{ transform: translate3d(calc(var(--x) + var(--drift-c)), var(--rise), 0) scale(var(--scale-end)); opacity:0; }
}

@keyframes pop{
    0%{ transform:scale(1); opacity:1; }
    65%{ transform:scale(1.35); opacity:.45; }
    100%{ transform:scale(.1); opacity:0; }
}

@keyframes splash{
    to{ transform: translate3d(var(--tx), var(--ty), 0) scale(0.2); opacity:0; }
}

@media (max-width:600px){
    .title{ font-size:21px; padding-top:18px; }
    .machine{ width:174px; height:106px; bottom:48px; font-size:16px; }
    .controls{ top:56px; transform:translateX(-50%) scale(.96); transform-origin:top center; }
}
</style>
</head>

<body>

<div class="title">阳光流光泡泡机 🫧</div>

<div class="controls" id="skinControls"></div>

<div class="machine" id="machine">
    长按连续喷泡泡
    <div class="nozzle"></div>
</div>

<script>
const machine = document.getElementById("machine");
const skinControls = document.getElementById("skinControls");

const skins = [
    {
        name:"粉嫩玩具",
        grad:"linear-gradient(145deg,#ff9ec0,#ff6f91)",
        shadow:"0 10px 30px rgba(255,120,170,.35)",
        accent:"#fff"
    },
    {
        name:"科幻霓光",
        grad:"linear-gradient(145deg,#4f6dff,#7d4cff 55%,#41d9ff)",
        shadow:"0 10px 34px rgba(84,103,255,.4)",
        accent:"#cbf9ff"
    },
    {
        name:"云朵梦境",
        grad:"linear-gradient(145deg,#c8d8ff,#e0cbff 48%,#ffd9ef)",
        shadow:"0 10px 30px rgba(148,155,232,.35)",
        accent:"#ffffff"
    }
];

let hueSeed = 180;
let autoIntervalMs = 580;
let holdTimer = null;
let audioCtx = null;
let blowerNodes = null;
let isHolding = false;
let swarmBias = 0;

const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function setSkin(index){
    const skin = skins[index] || skins[0];
    document.documentElement.style.setProperty("--machine-grad", skin.grad);
    document.documentElement.style.setProperty("--machine-shadow", skin.shadow);
    document.documentElement.style.setProperty("--machine-accent", skin.accent);

    [...skinControls.children].forEach((btn, i)=>{
        btn.classList.toggle("active", i===index);
    });
}

function renderSkins(){
    skins.forEach((skin, i)=>{
        const btn = document.createElement("button");
        btn.className = "skin-btn" + (i===0 ? " active" : "");
        btn.textContent = skin.name;
        btn.addEventListener("click", ()=>setSkin(i));
        skinControls.appendChild(btn);
    });
}

function ensureAudioContext(){
    if(!audioCtx){
        const ACtx = window.AudioContext || window.webkitAudioContext;
        if(!ACtx) return null;
        audioCtx = new ACtx();
    }
    if(audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    return audioCtx;
}

function createBlowerSound(){
    const ctx = ensureAudioContext();
    if(!ctx || blowerNodes) return;

    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 1.2, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = (Math.random()*2 - 1) * .65;

    const noiseSrc = ctx.createBufferSource();
    noiseSrc.buffer = noiseBuffer;
    noiseSrc.loop = true;

    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 560;
    bp.Q.value = 0.9;

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 1800;

    const wobble = ctx.createOscillator();
    wobble.type = "sine";
    wobble.frequency.value = 0.18;

    const wobbleGain = ctx.createGain();
    wobbleGain.gain.value = 70;

    const amp = ctx.createGain();
    amp.gain.value = 0.0001;

    wobble.connect(wobbleGain).connect(bp.frequency);
    noiseSrc.connect(bp).connect(lp).connect(amp).connect(ctx.destination);

    noiseSrc.start();
    wobble.start();

    blowerNodes = {noiseSrc, wobble, amp};
}

function startBlowerLoop(){
    createBlowerSound();
    if(!audioCtx || !blowerNodes) return;
    const now = audioCtx.currentTime;
    blowerNodes.amp.gain.cancelScheduledValues(now);
    blowerNodes.amp.gain.setValueAtTime(Math.max(0.0001, blowerNodes.amp.gain.value), now);
    blowerNodes.amp.gain.exponentialRampToValueAtTime(0.055, now + 0.18);
}

function stopBlowerLoop(){
    if(!audioCtx || !blowerNodes) return;
    const now = audioCtx.currentTime;
    blowerNodes.amp.gain.cancelScheduledValues(now);
    blowerNodes.amp.gain.setValueAtTime(Math.max(0.0001, blowerNodes.amp.gain.value), now);
    blowerNodes.amp.gain.exponentialRampToValueAtTime(0.0001, now + 0.26);
}

function noisePop(){
    const ctx = ensureAudioContext();
    if(!ctx) return;

    const dur = 0.11;
    const buffer = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = Math.random()*2 - 1;

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    const hp = ctx.createBiquadFilter();
    hp.type = "highpass";
    hp.frequency.value = 820;

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 3800;

    const amp = ctx.createGain();
    const now = ctx.currentTime;
    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(0.18, now + 0.012);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    noise.connect(hp).connect(lp).connect(amp).connect(ctx.destination);
    noise.start(now);
    noise.stop(now + dur + 0.02);
}

function createSplash(x, y, hue){
    for(let i=0;i<9;i++){
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        p.style.setProperty("--hue", hue);

        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 36 + 14;
        p.style.setProperty("--tx", `${Math.cos(angle) * distance}px`);
        p.style.setProperty("--ty", `${Math.sin(angle) * distance}px`);

        document.body.appendChild(p);
        p.addEventListener("animationend", ()=>p.remove());
    }
}

function popBubble(bubble){
    if(!bubble || bubble.dataset.popping === "1") return;
    bubble.dataset.popping = "1";

    const rect = bubble.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;
    const hue = bubble.style.getPropertyValue("--hue") || 190;

    bubble.style.animation = "pop .22s ease-out forwards";
    createSplash(x, y, hue);
    noisePop();

    bubble.addEventListener("animationend", ()=>bubble.remove(), {once:true});
}

function createBubble(){
    const bubble = document.createElement("div");
    const size = Math.random()*40 + 14;

    bubble.className = "bubble";
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";

    hueSeed = (hueSeed + 6 + Math.random() * 8) % 360;
    bubble.style.setProperty("--hue", Math.round(hueSeed));

    const startX = window.innerWidth / 2;
    bubble.style.left = (startX + (Math.random()*84 - 42)) + "px";
    bubble.style.bottom = "145px";

    swarmBias += (Math.random() - 0.5) * 18;
    swarmBias *= 0.82;
    const swarmSpread = (Math.random()*120 - 60) + swarmBias;
    const gatherKick = (Math.random() < 0.35 ? swarmBias * -0.25 : swarmBias * 0.2);
    bubble.style.setProperty("--x", `${swarmSpread}px`);
    bubble.style.setProperty("--drift-a", `${Math.random()*18 - 9}px`);
    bubble.style.setProperty("--drift-b", `${gatherKick + (Math.random()*24 - 12)}px`);
    bubble.style.setProperty("--drift-c", `${Math.random()*34 - 17}px`);

    const riseDistance = -(window.innerHeight + 120 + Math.random()*90);
    bubble.style.setProperty("--rise", `${riseDistance}px`);

    const baseRise = reducedMotion ? 8.4 : 7.2;
    const rise = baseRise + Math.random()*3.2 + Math.random()*1.8;
    bubble.style.animationDuration = `${rise.toFixed(2)}s`;

    bubble.style.setProperty("--scale-end", (Math.random()*0.48 + 0.95).toFixed(2));
    bubble.style.opacity = (Math.random()*0.35 + 0.56).toFixed(2);

    bubble.addEventListener("pointerdown", (e)=>{
        e.stopPropagation();
        popBubble(bubble);
    });

    document.body.appendChild(bubble);
    bubble.addEventListener("animationend", ()=>bubble.remove(), {once:true});
}

function burst(count = 10){
    const cadence = reducedMotion ? 52 : 44;
    for(let i=0;i<count;i++) setTimeout(createBubble, i*cadence + Math.random()*18);
}

function startHold(){
    if(isHolding) return;
    isHolding = true;
    machine.classList.add("is-active");
    ensureAudioContext();
    startBlowerLoop();
    burst(13);

    if(holdTimer) return;
    holdTimer = setInterval(()=>{
        burst(5);
    }, reducedMotion ? 320 : 250 + Math.random()*40);
}

function stopHold(){
    if(!isHolding && !holdTimer) return;
    isHolding = false;
    machine.classList.remove("is-active");
    stopBlowerLoop();
    if(holdTimer){
        clearInterval(holdTimer);
        holdTimer = null;
    }
}

machine.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    startHold();
});
machine.addEventListener("pointerup", stopHold);
machine.addEventListener("pointercancel", stopHold);
machine.addEventListener("pointerleave", stopHold);
window.addEventListener("pointerup", stopHold);
window.addEventListener("blur", stopHold);

document.addEventListener("visibilitychange", ()=>{
    if(document.hidden) stopHold();
});

renderSkins();

let auto = setInterval(()=>{
    createBubble();
    if(autoIntervalMs < 1750){
        autoIntervalMs += 95;
        clearInterval(auto);
        auto = setInterval(createBubble, autoIntervalMs);
    }
}, autoIntervalMs);
</script>

</body>
</html>
